name: 'Run Linter'
description: 'Run Linter'

inputs:
  os:
    description: "operating system"
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install Python Packages
      if: inputs.os != 'Windows'
      shell: bash
      run: |
        uv pip install --system flake8 pyproject-flake8 mypy
        uv pip install --system -r pyproject.toml --all-extras

    - name: Install Python Packages (Windows)
      if: inputs.os == 'Windows'
      shell: bash
      run: |
        uv pip install --system flake8 pyproject-flake8 mypy
        uv pip install --system -r pyproject.toml --extra graphblas --extra gui

    - name: Check import sorting with isort
      shell: bash
      run: |
        uvx --python 3.13 "isort==7.0.0" --profile black --line-length 120 --check --diff . || \
        { echo "::error::Import sorting check failed. Run 'isort --profile black --line-length 120 .' to fix."; exit 1; }

    - name: Check formatting with black
      shell: bash
      run: |
        uvx --python 3.13 "black==26.3.1" -l 120 -C --check --diff . || \
        { echo "::error::Black formatting check failed. Run 'black -l 120 -C .' to fix."; exit 1; }

    - name: Lint With flake8
      shell: bash
      run: |
        pflake8 .

    - name: Lint With MyPy
      shell: bash
      run: |
        mypy --install-types --non-interactive .

    - name: Lint with clang-format
      if: inputs.os == 'Linux'
      shell: bash
      run: |
        find . \
        -type d -name third_party -prune -o \
        -type d -name thirdparties -prune -o \
        -type d -name capnp -prune -o \
        -type d -name 'build*' -prune -o \
        -type f \( -name '*.cpp' -o -name '*.h' \) -print0 | \
        xargs -0 clang-format-21 --Werror --dry-run --

