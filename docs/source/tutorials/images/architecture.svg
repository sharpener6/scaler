      <rect x="490" y="210" width="150" height="120" rx="8" fill="#451a03" stroke="#eab308" stroke-width="2" filter="url(#shadow)" />
      <text x="565" y="272" fill="#fef08a">Worker Manager 2</text>
    </g>

