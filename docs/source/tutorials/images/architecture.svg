      <text x="100" y="427" fill="#e0f2fe">Client N</text>
      
      <circle cx="100" cy="310" r="3" fill="#64748b" />
      <circle cx="100" cy="325" r="3" fill="#64748b" />
      <circle cx="100" cy="340" r="3" fill="#64748b" />
