# Scaler AWS HPC Batch Test Configuration
#
# Usage:
#   1. Update job_queue, job_definition, s3_bucket with your provisioned values
#   2. Start all processes:  scaler scaler_aws_hpc_batch.toml
#   3. Run tests:  python aws_hpc_test_harness.py --scheduler tcp://127.0.0.1:2345 --test all

[object_storage_server]
bind_address = "tcp://127.0.0.1:2346"

[scheduler]
bind_address = "tcp://127.0.0.1:2345"
object_storage_address = "tcp://127.0.0.1:2346"
monitor_address = "tcp://127.0.0.1:2347"
policy_engine_type = "simple"
policy_content = "allocate=even_load; scaling=no"
logging_level = "INFO"

# Uncomment to enable the web GUI (requires: pip install 'opengris-scaler[gui]')
# [gui]
# monitor_address = "tcp://127.0.0.1:2347"
# gui_address = "127.0.0.1:50001"
# logging_level = "INFO"

[[worker_manager]]
type = "aws_hpc"
scheduler_address = "tcp://127.0.0.1:2345"
object_storage_address = "tcp://127.0.0.1:2346"
worker_manager_id = "wm-batch"
job_queue = "scaler-batch-queue"                          # from provisioner output
job_definition = "scaler-batch-job"                       # from provisioner output
s3_bucket = "scaler-batch-ACCOUNT_ID-us-east-1"           # replace ACCOUNT_ID with your AWS account ID
aws_region = "us-east-1"
max_concurrent_jobs = 100
job_timeout_minutes = 60
logging_level = "INFO"
